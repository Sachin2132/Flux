<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join CODEX | Create Your Account</title>
    <link rel="stylesheet" href="signup.css">
    <script type="module" src="signup.js" defer></script>
</head>
<body>
    <div class="signup-container">
        <h2>Start Your Journey</h2>
        <form id="signupForm" action="#" method="POST">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-container">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <ion-icon name="eye" id="toggle-password"></ion-icon>
                </div>
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="password-container">
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
                    <ion-icon name="eye" id="toggle-confirm-password"></ion-icon>
                </div>
            </div>
            <div id="error-message" class="error"></div>
            <button type="submit" id="submit" class="btn">Sign Up</button>
        </form>
        <p>Already a member? <a href="index.html">Log In</a></p>
    </div>
    <script src="https://unpkg.com/ionicons@5.4.0/dist/ionicons.js"></script>
</body>
</html>
